apiVersion: v1
kind: Pod
metadata:
  name: webapp-pod
  namespace: webapp
  labels:
    app: employees
spec:
  containers:
    - name: webapp
      image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/clo835-webapp:latest
      ports:
        - containerPort: 81
      env:
        - name: DBHOST
          value: mysql-service.mysql.svc.cluster.local
        - name: DBPORT
          value: "3306"
        - name: DBUSER
          value: user
        - name: DBPWD
          value: pw
        - name: DATABASE
          value: employees
