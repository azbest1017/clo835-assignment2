apiVersion: v1
kind: Pod
metadata:
  name: webapp-pod
  namespace: webapp
  labels:
    app: employees
spec:
  containers:
    - name: webapp
      image: 361706076089.dkr.ecr.us-east-1.amazonaws.com/clo835-app:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 8080
      env:
        - name: DBHOST
          value: mysql-service.mysql.svc.cluster.local
        - name: DBPORT
          value: "3306"
        - name: DBUSER
          value: root
        - name: DBPASSWORD
          value: pw
        - name: DATABASE
          value: employees
        - name: APP_COLOR
          value: lime
