apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: mysql-replicaset
  namespace: mysql
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/clo835-mysql:latest
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: pw
            - name: MYSQL_DATABASE
              value: employees
            - name: MYSQL_USER
              value: user
            - name: MYSQL_PASSWORD
              value: pw
