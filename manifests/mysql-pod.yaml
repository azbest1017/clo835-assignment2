apiVersion: v1
kind: Pod
metadata:
  name: mysql-pod
  namespace: mysql
  labels:
    app: mysql
spec:
  containers:
    - name: mysql
      image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/clo835-mysql:latest
      ports:
        - containerPort: 3306
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: pw
        - name: MYSQL_DATABASE
          value: employees
        - name: MYSQL_USER
          value: user
        - name: MYSQL_PASSWORD
          value: pw
